name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-logger:
    name: Build Logger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config meson ninja-build libfmt-dev libcurl4-openssl-dev

      - name: Configure logger
        run: CC=clang CXX=clang++ meson setup build src
        working-directory: logger

      - name: Build logger
        run: meson compile -C build
        working-directory: logger

  build-guestbook:
    name: Build Guestbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config meson ninja-build libfmt-dev

      - name: Configure guestbook
        run: CC=clang CXX=clang++ meson setup build src
        working-directory: guestbook

      - name: Build guestbook
        run: meson compile -C build
        working-directory: guestbook

  build-website:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          sudo apt-get update
          sudo apt-get install -y hugo

      - name: Build site
        run: hugo
        working-directory: website
