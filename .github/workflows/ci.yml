name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libfmt-dev libcurl4-openssl-dev hugo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install meson and ninja
        run: pip install -r .github/requirements.txt

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build all
        run: just build

      - name: Test
        run: just test

      - name: Bundle artifacts
        if: github.event_name == 'push'
        run: |
          mkdir -p bundle/bin bundle/website
          cp logger/build/logger bundle/bin/
          cp guestbook/build/guestbook bundle/bin/
          cp -r website/public bundle/website/

      - name: Upload bundle
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: solar-server-bundle
          path: bundle/
