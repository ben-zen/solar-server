name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-${{ runner.os }}-${{ runner.arch }}-ubuntu-24.04-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-${{ runner.arch }}-ubuntu-24.04-

      - name: Install system dependencies
        run: |
          mkdir -p "$HOME/apt-cache"
          sudo mkdir -p /tmp/apt-partial
          sudo chown _apt:root /tmp/apt-partial
          sudo chmod 700 /tmp/apt-partial
          sudo apt-get update
          sudo apt-get install -y \
            -o Dir::Cache::Archives="$HOME/apt-cache" \
            -o Dir::Cache::Archives::partial=/tmp/apt-partial \
            clang pkg-config libfmt-dev libcurl4-openssl-dev hugo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: '.github/requirements.txt'

      - name: Install meson and ninja
        run: python -m pip install -r .github/requirements.txt

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build all
        run: just build

      - name: Test
        run: just test

      - name: Bundle artifacts
        if: github.event_name == 'push'
        run: |
          mkdir -p bundle/bin bundle/website
          cp logger/build/logger bundle/bin/
          cp guestbook/build/guestbook bundle/bin/
          cp -r website/public bundle/website/

      - name: Upload bundle
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: solar-server-bundle
          path: bundle/
