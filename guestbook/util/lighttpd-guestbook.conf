# lighttpd configuration for the guestbook CGI endpoint.
# Install to /etc/lighttpd/conf-enabled/90-guestbook.conf
#
# Requires mod_cgi to be enabled:
#   sudo lighttpd-enable-mod cgi

server.modules += ("mod_cgi")

# Route /cgi-bin/guestbook to the guestbook binary.
$HTTP["url"] =~ "^/cgi-bin/guestbook" {
    cgi.assign = ( "" => "" )
}

# Set the LOGBOOK environment variable so the CGI knows where to write entries.
# This path must match the directory created by deploy.sh (/srv/guestbook).
setenv.add-environment = (
    "LOGBOOK" => "/srv/guestbook"
)

# Log CGI stderr to the lighttpd error log so guestbook diagnostics are captured.
server.errorlog = "/var/log/lighttpd/error.log"
