# Logrotate configuration for lighttpd error logs (includes guestbook CGI stderr).
# Install to /etc/logrotate.d/lighttpd
/var/log/lighttpd/*.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 640 www-data www-data
    sharedscripts
    postrotate
        if [ -f /var/run/lighttpd.pid ]; then
            kill -USR1 $(cat /var/run/lighttpd.pid)
        fi
    endscript
}
