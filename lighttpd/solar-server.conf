# lighttpd configuration for the solar-server project.
# Installed by `just deploy` to /etc/lighttpd/conf-enabled/90-solar-server.conf

server.document-root = "/www/solar-site"

server.modules += ( "mod_cgi", "mod_setenv" )

cgi.assign = ( "" => "" )
alias.url += ( "/cgi-bin/" => "/usr/lib/cgi-bin/" )

cgi.execute-x-only = "disable"
setenv.add-environment = ( "LOGBOOK" => "/www/solar-site/guestbook" )
